<!DOCTYPE html>
<html>
<head>
    <title>Register Patient</title>
    <style>
body{
    font-family: Arial, sans-serif;
    background:#f4f6f8;
    text-align:center;
}

.container{
    background:white;
    width:40%;
    margin:auto;
    margin-top:80px;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
    padding:10px;
    width:80%;
    margin:10px 0;
    border-radius:5px;
    border:1px solid #ccc;
}

button{
    padding:10px 15px;
    border:none;
    background:#2ecc71;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#27ae60;
}

a{
    display:block;
    margin-top:15px;
}
</style>

</head>
<body>
 <div class="container">

<h2>Register New Patient</h2>

<form method="POST">
<input type="text" name="name" placeholder="Enter patient name" required>
<br>
<button type="submit">Register Patient</button>
</form>

<a href="/">Back to Dashboard</a>

</div>
</body>
</html>
